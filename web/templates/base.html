<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>{% block title %}taboplex{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">

    <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type="image/x-icon">
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type="image/x-icon">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="{{ url_for('index') }}">
            <img
                class="brand-logo"
                src="{{ url_for('static', filename='img/taboplex.png') }}"
                alt="taboplex"
            >
        </a>

        <nav class="nav">
            <a href="{{ url_for('index') }}">Inicio</a>
            <a href="{{ url_for('peliculas') }}">Películas</a>
            <a href="{{ url_for('actualizacion_series') }}">Actualizar series</a>
            <a href="{{ url_for('compactacion') }}">Compactación</a>
        </nav>
    </header>

    <main class="page">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        taboplex · catálogo local · TrashCan Edition
    </footer>
</body>
</html>
